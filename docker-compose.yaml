services:
  server:
    image: nginx:stable-alpine
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html/src
      - ./.docker/nginx/conf.d/app.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app-dev

  app-dev:
    build:
      context: .
      target: dev
    volumes:
      - ./src:/var/www/html/src
    env_file: ./src/.env
    depends_on:
      db:
        condition: service_healthy     
    ports:
      - "9003:9003"
    extra_hosts:
      - "host.docker.internal:host-gateway"      

  app-test:
    build:
      context: .
      target: test
    volumes:
      - ./src:/var/www/html/src
    depends_on:
      db-test:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  app-prod:
    build:
      context: .
      target: prod
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  db:
    image: mysql:8.4
    restart: always
    environment:
      MYSQL_DATABASE: laravel_db
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
      

  db-test:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: laravel_test
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5    
    tmpfs:
      - /var/lib/mysql
    extra_hosts:
      - "host.docker.internal:host-gateway"      

volumes:
  db_data: